<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordlePro</title>
    <link rel="icon" type="image/png" href="wordle_logo_32x32.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">

    <!-- 引入官方替代字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="common.js"></script>

    <style>
        .icon-btn svg {
            width: 24px;
            height: 24px;
        }

        #main-layout {
            display: flex;
            flex-grow: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* 提示面板：绝对定位在左侧，全高 */
        #hint-panel {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 200px;
            background-color: var(--bg);
            border-right: 1px solid var(--border-empty);
            z-index: 20;
            display: none;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(0);
            }
        }

        /* 作答区：始终保持全屏居中 */
        #game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #game-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        /* --- 棋盘总容器：双栏布局 --- */
        #board {
            display: grid;
            /* 两列，每列宽度自适应内容 */
            grid-template-columns: auto auto;
            /* 左右两栏的间距，给 X 按钮留出足够空间 */
            column-gap: 80px;
            row-gap: 10px;
            padding-top: 40px;
            max-height: none;
            /* 双栏后高度减半，不再需要滚动条 */
            overflow: visible;
            grid-auto-flow: column;
            grid-template-rows: repeat(5, auto);
        }

        /* 移动端适配：双栏太宽，手机上切回单列 */
        @media (max-width: 1000px) {
            #board {
                grid-template-columns: auto;
                grid-template-rows: unset;
                grid-auto-flow: row;
                column-gap: 0;
            }

            .clear-row-btn {
                right: -45px !important;
            }
        }

        /* --- 逻辑模式棋盘滚动条样式（对齐提示栏） --- */

        /* 1. 设置滚动条宽度 */
        #board::-webkit-scrollbar {
            width: 4px;
        }

        /* 2. 设置滚动条滑块（颜色使用边框色，保持低调一致） */
        #board::-webkit-scrollbar-thumb {
            background: var(--border-empty);
            border-radius: 4px;
            /* 稍微圆角化 */
        }

        /* 3. 鼠标悬停在滑块上时稍微加深颜色（可选优化） */
        #board::-webkit-scrollbar-thumb:hover {
            background: var(--border-filled);
        }

        /* 4. 设置滚动条轨道背景（透明或淡色） */
        #board::-webkit-scrollbar-track {
            background: transparent;
        }

        /* 键盘：等宽设计 */
        #keyboard {
            width: 100%;
            padding: 0 10px 20px;
            flex-shrink: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            gap: 6px;
        }

        .tile,
        .count-tile {
            width: var(--tile-size);
            height: var(--tile-size);
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            box-sizing: border-box;
            user-select: none;
        }

        /* 计分区域：紧贴字母区右侧 */
        .stats-grid {
            margin-left: 15px;
            /* 字母区和计分区的固定间距 */
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 5px;
            width: 196px;
            /* (62*3) + (5*2) */
            height: 62px;
            border: 2px solid var(--border-empty);
            border-radius: 4px;
            transition: border-color 0.3s;
        }

        .stats-grid.revealed {
            border-color: transparent;
        }

        /* 黑暗模式下的底色微调 */
        body.dark-mode .stats-grid {
            background-color: rgba(255, 255, 255, 0.03);
        }

        /* 内部计分块：默认全透明，只有被填入数字后才显现 */
        .count-tile {
            width: var(--tile-size);
            height: var(--tile-size);
            font-size: 2rem;
            border: none !important;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff !important;

            /* 初始完全透明 */
            opacity: 0;
            transform: scale(0.8);
            /* 增加一个微小的缩放效果 */
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .stats-grid.revealed .count-tile {
            opacity: 1;
            transform: scale(1);
        }

        /* 强制指定计分方块的背景颜色，防止被提交后的灰色覆盖 */
        .count-tile[data-state="correct"] {
            background-color: var(--green) !important;
        }

        .count-tile[data-state="present"] {
            background-color: var(--yellow) !important;
        }

        .count-tile[data-state="absent"] {
            background-color: var(--gray) !important;
        }

        /* 字母方块提交后变灰（保持逻辑：不告诉哪个字母对，只在右侧显示总数） */
        .tiles-grid .tile[data-state="submitted"] {
            background-color: #3a3a3c;
            /* 使用深灰色 */
            border-color: #3a3a3c;
            color: #ffffff;
        }

        @media (max-width: 600px) {

            :root {
                --tile-size: 38px;
            }

            .tile,
            .count-tile {
                width: var(--tile-size);
                height: var(--tile-size);
                font-size: 1.2rem;
            }

            .tiles-grid {
                width: 230px;
            }

            .stats-grid {
                width: calc(var(--tile-size) * 3 + 5px * 2);
                height: var(--tile-size);
            }
        }

        .row-stats {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            opacity: 0;
            /* 默认隐藏，提交后显示 */
            transition: opacity 0.5s ease;
            font-size: 14px;
            font-weight: bold;
        }

        .stat-unit {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e3e3e1;
            /* 官网米灰色 */
            color: #000000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease-out;
        }

        .start-content {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .start-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
        }

        .start-title {
            font-family: 'Roboto Slab', serif;
            font-size: 50px;
            font-weight: 700;
            margin: 0 0 12px;
        }

        .start-subtitle {
            font-family: 'Roboto Slab', sans-serif;
            font-size: 38px;
            font-weight: 350;
            margin: 0 0 36px;
        }

        .play-btn {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 30px;
            height: 48px;
            width: 150px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .play-btn:active {
            transform: scale(0.96);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #modal-message {
            margin-bottom: 24px;
            font-size: 18px;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 24px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            transition: filter 0.2s;
        }

        /* 确定按钮：黑色(浅色模式)或白色(深色模式) */
        .modal-btn.confirm {
            background-color: var(--text);
            color: var(--bg);
        }

        /* 取消按钮：灰色 */
        .modal-btn.cancel {
            background-color: var(--gray);
            color: #ffffff;
        }

        .modal-btn:hover {
            filter: brightness(1.2);
        }

        /* 设置面板专用样式 */
        .settings-content {
            max-width: 480px;
            padding: 16px 32px;
            text-align: left;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .settings-header h2 {
            margin: 0;
            font-size: 16px;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        /* 高对比度模式下的根变量覆盖 */
        body.high-contrast {
            --green: #f5793a;
            /* 橘色替代绿色 */
            --yellow: #85c0f9;
            /* 浅蓝替代黄色 */
        }

        /* 设置中的 Select 样式 */
        #lang-select-settings {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border-empty);
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="start-screen">
        <div class="start-content">
            <img src="wordle-icon.svg" class="start-logo">
            <h1 class="start-title">WordlePro</h1>
            <p class="start-subtitle">Loading...</p>
            <button class="play-btn" onclick="dismissStartScreen()">Play</button>
        </div>
    </div>
    <!-- Header 部分 -->
    <header>
        <button class="icon-btn" onclick="location.href='index.html'" title="Back">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="header-controls">
            <button class="icon-btn" id="reset-btn" title="Restart" onclick="resetGame()">
                <i class="fa-solid fa-arrow-rotate-left"></i>
            </button>
            <button class="icon-btn" id="mode-toggle-btn" title="Toggle Mode" onclick="toggleWordMode()">
                <i id="mode-icon" class="fa-solid fa-star"></i>
            </button>
        </div>

        <img src="wordle-icon.svg" class="header-logo" alt="Logo">
        <p class="header-title">WordlePro</p>

        <div class="header-settings">
            <button class="icon-btn" onclick="openSettings()">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <!-- 设置模态框 -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content settings-content">
            <div class="settings-header">
                <h2 id="settings-title">SETTINGS</h2>
                <button class="icon-btn" onclick="closeSettings()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="setting-item">
                <div class="setting-text">
                    <div class="setting-label" id="label-dark-mode">Dark Mode</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="setting-dark-mode" onchange="toggleTheme(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-text">
                    <div class="setting-label" id="label-high-contrast">High Contrast Mode</div>
                    <div class="setting-desc" id="desc-high-contrast">For improved color vision</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="setting-high-contrast" onchange="toggleHighContrast(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-text">
                    <div class="setting-label" id="label-language">Language</div>
                </div>
                <select id="lang-select-settings" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                </select>
            </div>

            <div class="settings-footer">
                <p>©
                    <script>document.write(new Date().getFullYear())</script> WordlePro
                </p>
            </div>
        </div>
    </div>

    <div id="loading">Loading dictionary...</div>
    <div id="toast-container"></div>

    <div id="main-layout">
        <aside id="hint-panel">
            <div id="hint-header">Possible Words</div>
            <div id="hint-list-container">
                <!-- 核心：使用 pre 标签处理成千上万个单词的换行 -->
                <pre id="hint-list-pre"></pre>
            </div>
        </aside>

        <main id="game-area">
            <div id="game-container">
                <div id="board"></div>
            </div>

            <div id="marking-toolbox">
                <button class="tool-btn" data-tool="correct" onclick="selectTool('correct')">
                    <i class="fa-solid fa-square icon-correct"></i>
                </button>
                <button class="tool-btn" data-tool="half" onclick="selectTool('half')">
                    <i class="fa-solid fa-square icon-half"></i>
                </button>
                <button class="tool-btn" data-tool="present" onclick="selectTool('present')">
                    <i class="fa-solid fa-square icon-present"></i>
                </button>
                <button class="tool-btn" data-tool="absent" onclick="selectTool('absent')">
                    <i class="fa-solid fa-square icon-absent"></i>
                </button>
                <button class="tool-btn" data-tool="erase" onclick="selectTool('erase')">
                    <i class="fa-solid fa-eraser"></i>
                </button>

                <div class="tool-divider"></div>

                <!-- 逻辑快照工具 -->
                <button class="tool-btn action-btn" title="保存逻辑快照" onclick="saveMarkings()"><i
                        class="fa-solid fa-bookmark"></i></button>
                <button class="tool-btn action-btn" title="回退逻辑快照" onclick="loadMarkings()"><i
                        class="fa-solid fa-rotate-left"></i></button>
            </div>
    </div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row" id="row1"></div>
        <div class="keyboard-row" id="row2"></div>
        <div class="keyboard-row" id="row3"></div>
    </div>
    </main>
    </div>

    <!-- 自定义确认弹窗 -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="modal-btn cancel"></button>
                <button id="modal-confirm-btn" class="modal-btn confirm"></button>
            </div>
        </div>
    </div>

    <script>
        const ANSWERS_FILE = 'possible_words.txt';
        const ALLOWED_FILE = 'allowed_words.txt';

        let targetWord = "";
        let validGuesses = new Set();
        let answersPool = [];
        let currentGuess = "";
        let guesses = [];
        let isAnimating = false;
        let initialized = false;
        let gameOverToast = null;
        let gameStatus = "playing";
        let hintsVisible = false;
        let bounceTimeouts = []; // 用于追踪胜利跳动的计时器
        let activeMarkingTool = null; // 当前选中的工具: 'correct', 'present', 'absent', 'erase'

        let constraints = {
            correct: Array(5).fill(null),
            present: {},
            absent: new Set()
        };

        let gameMode = localStorage.getItem('wordle_game_mode') || "normal";
        let combinedPool = [];   // 存放所有合法词汇
        let isResetting = false; // 重新加载按钮的冷却锁
        let isModeChanging = false; // 冷却状态锁

        const i18n = {
            en: {
                wordleTitle: "Logic Mode",
                play: "Play",
                subtitle: "Get 10 chances to guess a <span style='white-space:nowrap'>5-letter</span> word.",
                newGame: "New Game Started",
                notEnough: "Not enough letters",
                notInList: "Not in word list",
                allMode: "Mode: All Words",
                commonMode: "Mode: Common Words",
                confirmReset: "Are you sure you want to restart? Your current progress will be lost.",
                confirmMode: "Switching modes will restart the game. Continue?",
                possible: "Possible",
                possibleWords: "Possible Words",
                praises: [
                    "Genius",      // 第1次
                    "Magnificent", // 第2次
                    "Impressive",  // 第3次
                    "Splendid",    // 第4次
                    "Great",       // 第5次
                    "Phew",        // 第6次
                    "Strategic",   // 第7次
                    "Methodical",  // 第8次
                    "Persistent",  // 第9次
                    "Clinical"     // 第10次
                ],
                cancel: "Cancel",
                confirm: "Confirm",
                settings: "SETTINGS",
                hardMode: "Hard Mode",
                hardModeDesc: "Any revealed hints must be used in subsequent guesses",
                darkMode: "Dark Mode",
                highContrast: "High Contrast Mode",
                highContrastDesc: "For improved color vision",
                language: "Language",
                hardModeGreen: "Hard Mode: {pos} letter must be {char}",
                hardModeYellow: "Hard Mode: Must contain {char}",
                ordinals: ["1st", "2nd", "3rd", "4th", "5th"],
                markingMode: "Marking Mode: ",
                normalMode: "Normal Mode",
                onlySubmitted: "Only submitted tiles can be marked",
                tools: {
                    correct: "GREEN",
                    half: "HALF (GREEN/YELLOW)",
                    present: "YELLOW",
                    absent: "GRAY",
                    erase: "ERASE",
                },
                saveSuccess: "Marking State Saved",
                loadSuccess: "Marking State Restored",
                noSave: "No saved state found",
                confirmSave: "Save current markings as a snapshot?",
                confirmLoad: "Restore markings from snapshot? Current unsaved marks will be lost.",
            },
            zh: {
                wordleTitle: "逻辑模式",
                play: "开始游戏",
                subtitle: "你有 10 次机会猜出一个 5 个字母的单词。",
                newGame: "新游戏已开始",
                notEnough: "字数不足",
                notInList: "单词不在词库中",
                allMode: "模式：全部词汇",
                commonMode: "模式：常用词汇",
                confirmReset: "确定要重新开始吗？当前进度将丢失。",
                confirmMode: "切换模式将重启游戏。是否继续？",
                possible: "个可能",
                possibleWords: "候选词汇",
                praises: [
                    "天才",   // 第1次
                    "卓越",   // 第2次
                    "惊人",   // 第3次
                    "华丽",   // 第4次
                    "优秀",   // 第5次
                    "险胜",   // 第6次
                    "严谨",   // 第7次
                    "睿智",   // 第8次
                    "毅力",   // 第9次
                    "绝杀"    // 第10次
                ],
                cancel: "取消",
                confirm: "确定",
                settings: "设置",
                hardMode: "困难模式",
                hardModeDesc: "所有提示必须在后续猜测中使用",
                darkMode: "深色模式",
                highContrast: "高对比度模式",
                highContrastDesc: "优化颜色区分",
                language: "语言",
                hardModeGreen: "困难模式：第 {pos} 个字母必须是 {char}",
                hardModeYellow: "困难模式：必须包含 {char}",
                ordinals: ["1", "2", "3", "4", "5"],
                markingMode: "标记模式: ",
                normalMode: "正常游戏模式",
                onlySubmitted: "只能标记已提交的方格",
                tools: {
                    correct: "绿色",
                    half: "绿色/黄色",
                    present: "黄色",
                    absent: "灰色",
                    erase: "擦除",
                },
                saveSuccess: "标记状态已存档",
                loadSuccess: "标记状态已读档",
                noSave: "未找到存档记录",
                confirmSave: "将当前标记保存到存档？",
                confirmLoad: "从存档恢复标记？当前未存档的标记将丢失。",
            },
        };


        // --- 初始化补充 ---
        function initSettings() {
            if (isHighContrast) document.body.classList.add('high-contrast');
            // 更新设置面板翻译
            updateUILanguage();
        }

        function updateUILanguage() {
            const t = i18n[currentLang];
            // 更新起始页
            const playBtn = document.querySelector('.play-btn');
            if (playBtn) playBtn.textContent = t.play;
            const subtitle = document.querySelector('.start-subtitle');
            if (subtitle) subtitle.innerHTML = t.subtitle;

            // 更新提示面板标题
            const hintHeaderTitle = document.getElementById('hint-header-title'); // 如果你给标题加了ID
            // 简单起见，直接定位
            document.getElementById('hint-header').firstChild.textContent = t.possibleWords;

            // 更新选择框的值
            document.querySelector('title').textContent = `WordlePro - ${t.wordleTitle}`;
            document.getElementById('settings-title').textContent = t.settings;
            document.getElementById('label-dark-mode').textContent = t.darkMode;
            document.getElementById('label-high-contrast').textContent = t.highContrast;
            document.getElementById('desc-high-contrast').textContent = t.highContrastDesc;
            document.getElementById('label-language').textContent = t.language;

            // 同步设置面板控件的值
            const langSelect = document.getElementById('lang-select-settings');
            if (langSelect) langSelect.value = currentLang;

            // 更新提示面板标题
            const hintHeader = document.getElementById('hint-header');
            if (hintHeader) hintHeader.textContent = t.possibleWords;

            // 更新当前的提示列表（词频后缀等）
            updateHintList();
        }

        async function initGame() {
            const [res1, res2] = await Promise.all([fetch(ANSWERS_FILE), fetch(ALLOWED_FILE)]);
            const text1 = await res1.text();
            const text2 = await res2.text();
            answersPool = text1.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length === 5).sort();
            const allowed = text2.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length === 5);
            validGuesses = new Set([...answersPool, ...allowed]);
            combinedPool = Array.from(validGuesses).sort();

            // 1. 恢复游戏进度 (单词、猜测记录)
            const savedSession = localStorage.getItem('hard_wordle_session');
            if (savedSession) {
                const session = JSON.parse(savedSession);
                targetWord = session.targetWord;
                guesses = session.guesses;
                gameStatus = session.gameStatus;
                restoreBoardFromSession(); // 这个函数在上一条回复中提供过
            } else {
                startNewRound();
            }

            // 2. 核心新增：恢复草稿颜色
            restoreMarkings();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('board').style.visibility = 'visible';
            initialized = true;
        }

        function restoreBoardFromSession() {
            guesses.forEach((guess, rowIdx) => {
                // 1. 填入单词并变灰
                for (let i = 0; i < 5; i++) {
                    const tile = document.getElementById(`tile-${rowIdx}-${i}`);
                    tile.textContent = guess[i];
                    tile.setAttribute("data-state", "submitted");
                }
                // 2. 重新计算并显示右侧统计块
                const targetArr = [...targetWord];
                const guessArr = guess.split("");
                let green = 0, yellow = 0;
                const tUsed = Array(5).fill(false), gUsed = Array(5).fill(false);
                guessArr.forEach((c, i) => { if (c === targetArr[i]) { green++; tUsed[i] = gUsed[i] = true; } });
                guessArr.forEach((c, i) => {
                    if (!gUsed[i]) {
                        const fi = targetArr.findIndex((tc, ti) => !tUsed[ti] && tc === c);
                        if (fi !== -1) { yellow++; tUsed[fi] = true; }
                    }
                });

                const statsGrid = document.getElementById(`stats-${rowIdx}`);
                const counts = statsGrid.querySelectorAll(".count-tile");
                counts[0].textContent = green;
                counts[1].textContent = yellow;
                counts[2].textContent = 5 - green - yellow;
                statsGrid.classList.add("revealed");
            });
        }

        function startNewRound() {
            // 1. 清除提示框
            clearPersistentToast();

            // 2. 物理清除本地存储的所有记录
            localStorage.removeItem('hard_wordle_session');      // 清除进度
            localStorage.removeItem('hard_wordle_current_marks'); // 清除草稿
            localStorage.removeItem('hard_wordle_snapshot');      // 清除手动快照

            bounceTimeouts.forEach(clearTimeout);
            bounceTimeouts = [];

            const pool = (gameMode === "normal") ? answersPool : combinedPool;
            targetWord = pool[Math.floor(Math.random() * pool.length)];

            currentGuess = "";
            guesses = [];
            gameStatus = "playing";
            constraints = { correct: Array(5).fill(null), present: {}, absent: new Set() };
            updateHintList();

            document.querySelectorAll('.tile').forEach(tile => {
                if (!tile.classList.contains('count-tile')) {
                    tile.textContent = "";
                    tile.removeAttribute("data-state");
                } else {
                    tile.textContent = "0";
                }
                tile.classList.remove("pop", "shake", "flip", "bounce");
            });

            // --- 核心修复：清理计分容器状态 ---
            document.querySelectorAll('.stats-grid').forEach(grid => {
                // 1. 移除 revealed 类，这会让内部方块透明，并让边框重新显现
                grid.classList.remove("revealed");

                // 2. 不要在这里写 grid.style.visibility = "hidden"，
                // 因为我们在 CSS 里要求边框在未提交前必须可见。
            });

            document.querySelectorAll('.key').forEach(key => {
                key.removeAttribute("data-state");
                key.style.backgroundColor = "";
                key.style.color = "";
            });

            // 清理所有标记
            document.querySelectorAll('[data-mark]').forEach(el => el.removeAttribute('data-mark'));
            // 清理键盘颜色
            document.querySelectorAll('.key').forEach(k => {
                k.style.backgroundColor = "";
                k.style.color = "";
            });

            updateClearBtnVisibility();
        }

        async function toggleWordMode() {
            if (isModeChanging || isAnimating) return;

            // 如果有进度，弹出原生确认框
            if (isGameDirty()) {
                // 核心修改：等待异步确认
                const confirmed = await showCustomConfirm(i18n[currentLang].confirmMode);
                if (!confirmed) return;
            }

            const btn = document.getElementById('mode-toggle-btn');
            const icon = document.getElementById('mode-icon');

            btn.disabled = true;

            localStorage.setItem('wordle_game_mode', gameMode);

        // --- 新增模式切换函数 ---
        function toggleMode() {
            if (isAnimating) return;

            const modeIcon = document.getElementById('mode-icon');

            if (gameMode === "normal") {
                gameMode = "all";

            } else {

        function toggleHints() {
            hintsVisible = !hintsVisible;
            const panel = document.getElementById('hint-panel');
            panel.style.display = hintsVisible ? 'flex' : 'none';
            if (hintsVisible) updateHintList();
        }

        function updateHintList() {
            const listPre = document.getElementById('hint-list-pre');
            if (!listPre) return;

            const currentPool = (gameMode === "normal") ? answersPool : combinedPool;

            const possible = currentPool.filter(word => {
                for (let i = 0; i < 5; i++) {
                    if (constraints.correct[i] && word[i] !== constraints.correct[i]) return false;
                }
                for (let char in constraints.present) {
                    if (!word.includes(char)) return false;
                    for (let pos of constraints.present[char]) {
                        if (word[pos] === char) return false;
                    }
                }
                for (let char of constraints.absent) {
                    if (constraints.correct.includes(char) || constraints.present[char]) continue;
                    if (word.includes(char)) return false;
                }
                return true;
            });

            document.getElementById('hint-header').textContent = `${possible.length} ${i18n[currentLang].possible}`;

            // 使用 \n 换行，textContent 性能极高，不会导致卡死
            listPre.textContent = possible.join('\n');
        }

        async function resetGame() {
            if (isResetting || isAnimating) return;

            if (isGameDirty()) {
                // 核心修改：等待异步确认
                const confirmed = await showCustomConfirm(i18n[currentLang].confirmReset);
                if (!confirmed) return;
            }

            const btn = document.getElementById('reset-btn');
            isResetting = true;
            if (btn) btn.disabled = true;

            if (document.activeElement) document.activeElement.blur();

            startNewRound();
            showToast(i18n[currentLang].newGame);

            setTimeout(() => {
                isResetting = false;
                if (btn) btn.disabled = false;
            }, 5000);
        }

        const board = document.getElementById("board");
        board.innerHTML = "";

        // 为了实现左边 1-5 行，右边 6-10 行的视觉顺序
        // 我们可以直接按 0-9 生成，然后靠 CSS 控制
        for (let r = 0; r < 10; r++) {
            const row = document.createElement("div");

                        const t = i18n[currentLang];
                        if (tile.getAttribute('data-state') === 'submitted') {
                            applyMark(tile);
                        } else {
                            // 如果点击的是空格子，可以弹一个轻提示（可选）

                };
                tilesGrid.appendChild(tile);
            }

            // 2. 计分格容器
            const statsGrid = document.createElement("div");
            statsGrid.className = "stats-grid";
            statsGrid.id = `stats-${r}`;
            ["correct", "present", "absent"].forEach(state => {
                const ct = document.createElement("div");
                ct.className = "tile count-tile";
                ct.setAttribute("data-state", state);

            // 3. 清除按钮
            const clr = document.createElement("button");
            clr.className = "clear-row-btn";
            clr.id = `clear-row-${r}`;
            clr.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';

            // 使用 common.js 里的统一函数
            clr.onclick = (e) => {
                clearCurrentLine();

                if (e.currentTarget) {
                    e.currentTarget.blur();
                }
            };

            row.appendChild(tilesGrid);
            row.appendChild(statsGrid);
            row.appendChild(clr);
            board.appendChild(row);
        }

        const keyRows = [['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'], ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'], ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']];
        keyRows.forEach((row, idx) => {
            const rowEl = document.getElementById(`row${idx + 1}`);
            row.forEach(key => {
                const btn = document.createElement("button");
                btn.className = "key";
                if (key === "ENTER" || key === "⌫") btn.classList.add("wide");
                btn.dataset.key = key;
                if (key === "⌫") {
                    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H7.07L2.4 12l4.66-7H22v14zm-11.59-2L14 13.41 17.59 17 19 15.59 15.41 12 19 8.41 17.59 7 14 10.59 10.41 7 9 8.41 12.59 12 9 15.59z"></path></svg>`;
                } else {
                    btn.textContent = key;
                }
                btn.onclick = (e) => {
                    if (activeMarkingTool) {
                        if (key !== "ENTER" && key !== "⌫") {
                            applyMark(btn);
                            return;
                        }
                    }
                    handleInput(key);
                    e.currentTarget.blur();
                };
                rowEl.appendChild(btn);
            });
        });

        function selectTool(tool) {
            // 核心修复：获取当前被点击的按钮并强制失焦
            const clickedBtn = document.querySelector(`.tool-btn[data-tool="${tool}"]`);
            if (clickedBtn) clickedBtn.blur();

            const btns = document.querySelectorAll('.tool-btn');
            const t = i18n[currentLang];

            if (activeMarkingTool === tool) {
                activeMarkingTool = null;
                btns.forEach(b => b.classList.remove('active'));
                showToast(t.normalMode);
            } else {
                activeMarkingTool = tool;
                btns.forEach(b => {
                    b.classList.toggle('active', b.dataset.tool === tool);
                });

                const toolNames = {
                    correct: t.tools.correct,
                    present: t.tools.present,
                    absent: t.tools.absent,
                    half: t.tools.half,
                    erase: t.tools.erase
                };
                showToast(t.markingMode + toolNames[tool]);
            }

            // 双重保险：确保页面上没有任何元素处于聚焦状态
            if (document.activeElement) {
                document.activeElement.blur();
            }
        }

        function applyMark(el) {
            if (!activeMarkingTool) return;

            if (activeMarkingTool === 'erase') {
                el.removeAttribute('data-mark');
                if (el.classList.contains('key')) {
                    el.style.backgroundColor = "";
                    el.style.color = "";
                }
            } else {
                el.setAttribute('data-mark', activeMarkingTool);
            }

            // 核心新增：每次标记后，自动保存当前全场标记状态
            autoSaveAllMarkings();
        }

        // 获取全场标记并存入本地存储
        function autoSaveAllMarkings() {
            const currentMarks = {
                tiles: [],
                keys: []
            };

            // 记录方格
            document.querySelectorAll('.tile[data-mark]').forEach(tile => {
                currentMarks.tiles.push({ id: tile.id, mark: tile.getAttribute('data-mark') });
            });

            // 记录键盘
            document.querySelectorAll('.key[data-mark]').forEach(key => {
                currentMarks.keys.push({ keyVal: key.dataset.key, mark: key.getAttribute('data-mark') });
            });

            localStorage.setItem('hard_wordle_current_marks', JSON.stringify(currentMarks));
        }

        // 从本地存储恢复标记
        function restoreMarkings() {
            const saved = localStorage.getItem('hard_wordle_current_marks');
            if (!saved) return;

            const data = JSON.parse(saved);
            // 还原方格
            data.tiles.forEach(item => {
                const el = document.getElementById(item.id);
                if (el) el.setAttribute('data-mark', item.mark);
            });
            // 还原键盘
            data.keys.forEach(item => {
                const el = document.querySelector(`.key[data-key="${item.keyVal}"]`);
                if (el) el.setAttribute('data-mark', item.mark);
            });
        }

        // --- 修改后的存档函数 ---
        async function saveMarkings() {
            if (document.activeElement) document.activeElement.blur();

            // 弹出自定义确认窗口
            const confirmed = await showCustomConfirm(i18n[currentLang].confirmSave);
            if (!confirmed) return;

            const markingData = {
                tiles: [],
                keys: []
            };

            document.querySelectorAll('.tile[data-mark]').forEach(tile => {
                markingData.tiles.push({ id: tile.id, mark: tile.getAttribute('data-mark') });
            });

            document.querySelectorAll('.key[data-mark]').forEach(key => {
                markingData.keys.push({ keyVal: key.dataset.key, mark: key.getAttribute('data-mark') });
            });

            localStorage.setItem('hard_wordle_snapshot', JSON.stringify(markingData));
            showToast(i18n[currentLang].saveSuccess);
        }

        // --- 修改后的读档函数 ---
        async function loadMarkings() {
            if (document.activeElement) document.activeElement.blur();

            const savedData = localStorage.getItem('hard_wordle_snapshot');
            if (!savedData) {
                showToast(i18n[currentLang].noSave);
                return;
            }

            // 弹出自定义确认窗口
            const confirmed = await showCustomConfirm(i18n[currentLang].confirmLoad);
            if (!confirmed) return;

            const data = JSON.parse(savedData);

            // 1. 先清空当前所有标记
            document.querySelectorAll('[data-mark]').forEach(el => el.removeAttribute('data-mark'));

            // 2. 还原方格
            data.tiles.forEach(item => {
                const el = document.getElementById(item.id);
                if (el) el.setAttribute('data-mark', item.mark);
            });

            // 3. 还原键盘
            data.keys.forEach(item => {
                const el = document.querySelector(`.key[data-key="${item.keyVal}"]`);
                if (el) el.setAttribute('data-mark', item.mark);
            });

            // 4. 读档后也要触发一次自动存档，确保刷新后维持读档后的状态
            autoSaveAllMarkings();

            showToast(i18n[currentLang].loadSuccess);
        }

        function handleInput(key) {
            if (!initialized || isAnimating || gameStatus !== "playing") return;

            // --- 核心修改：如果是标记模式，拦截并处理键盘按钮标记 ---
            if (activeMarkingTool) {
                // 如果是功能键，不进行标记
                if (key === "ENTER" || key === "⌫") return;

                const keyEl = document.querySelector(`.key[data-key="${key.toUpperCase()}"]`);
                if (keyEl) applyMark(keyEl);
                return; // 拦截，不输入字母
            }

            if (key === "ENTER") {
                validateAndSubmit();
            } else if (key === "⌫" || key === "Backspace") {
                if (currentGuess.length > 0) {
                    // 修复点：使用新的行列 ID 格式
                    const row = guesses.length;
                    const col = currentGuess.length - 1;
                    const tile = document.getElementById(`tile-${row}-${col}`);

                    if (tile) {
                        tile.textContent = "";
                        tile.removeAttribute("data-state");
                        tile.classList.remove("pop");
                    }
                    currentGuess = currentGuess.slice(0, -1);
                }
            } else if (/^[A-Z]$/.test(key.toUpperCase()) && currentGuess.length < 5) {
                const char = key.toUpperCase();
                // 修复点：使用新的行列 ID 格式
                const row = guesses.length;
                const col = currentGuess.length;
                const tile = document.getElementById(`tile-${row}-${col}`);

                if (tile) {
                    tile.textContent = char;
                    tile.setAttribute("data-state", "filled");
                    tile.classList.remove("pop");
                    void tile.offsetWidth;
                    tile.classList.add("pop");
                }
                currentGuess += char;
            }

            updateClearBtnVisibility();
        }

        document.onkeydown = (e) => {
            if (e.key === "Enter" && document.activeElement) document.activeElement.blur();
            handleInput(e.key === "Enter" ? "ENTER" : e.key === "Backspace" ? "⌫" : e.key.toUpperCase());
        };

        // --- 困难模式逻辑拦截 ---
        // 修改 validateAndSubmit 函数，在有效性检查后增加困难模式检查：
        async function validateAndSubmit() {
            // 1. 检查长度
            if (currentGuess.length < 5) {
                showToast(i18n[currentLang].notEnough);
                shakeRow();
                return;
            }

            // 2. 检查词库是否包含该单词
            if (!validGuesses.has(currentGuess)) {
                showToast(i18n[currentLang].notInList);
                shakeRow();
                return;
            }

            // 3. 直接提交
            submitGuess();
        }

        function shakeRow() {
            const row = guesses.length; // 获取当前行
            for (let i = 0; i < 5; i++) {
                // 修复点：使用新的行列 ID 格式
                const tile = document.getElementById(`tile-${row}-${i}`);
                if (tile) {
                    tile.classList.remove("shake");
                    void tile.offsetWidth;
                    tile.classList.add("shake");
                    setTimeout(() => tile.classList.remove("shake"), 600);
                }
            }
        }

        function submitGuess() {
            isAnimating = true;
            const rowIdx = guesses.length;
            const guessString = currentGuess;
            const guessArr = guessString.split("");
            const targetArr = [...targetWord];

            // 统计逻辑
            let green = 0, yellow = 0, gray = 0;
            const targetUsed = Array(5).fill(false);
            const guessUsed = Array(5).fill(false);

            guessArr.forEach((c, i) => {
                if (c === targetArr[i]) {
                    green++;
                    targetUsed[i] = true;
                    guessUsed[i] = true;
                }
            });

            guessArr.forEach((c, i) => {
                if (!guessUsed[i]) {
                    const foundIdx = targetArr.findIndex((tc, ti) => !targetUsed[ti] && tc === c);
                    if (foundIdx !== -1) {
                        yellow++;
                        targetUsed[foundIdx] = true;
                    } else {
                        gray++;
                    }
                }
            });

            // 1. 字母方块翻转
            guessArr.forEach((_, i) => {
                // 修复点：使用新的行列 ID 格式
                const tile = document.getElementById(`tile-${rowIdx}-${i}`);
                if (tile) {
                    setTimeout(() => {
                        tile.classList.remove("pop", "shake", "flip");
                        void tile.offsetWidth;
                        tile.classList.add("flip");
                        setTimeout(() => tile.setAttribute("data-state", "submitted"), 250);
                    }, i * 300);
                }
            });

            // 2. 动画结束后显示右侧统计方块
            setTimeout(() => {
                const statsGrid = document.getElementById(`stats-${rowIdx}`);
                if (statsGrid) {
                    const countTiles = statsGrid.querySelectorAll(".count-tile");

                    countTiles[0].textContent = green;
                    countTiles[1].textContent = yellow;
                    countTiles[2].textContent = (5 - green - yellow);

                    // 关键修改：添加类名触发内部显现动画，而不是修改容器显示状态
                    statsGrid.classList.add("revealed");
                }

                if (guessString === targetWord) {
                    gameStatus = "won";
                    showToast(i18n[currentLang].praises[guesses.length - 1]);

                    // 胜利跳动动画修复
                    for (let i = 0; i < 5; i++) {
                        const tile = document.getElementById(`tile-${rowIdx}-${i}`);
                        const tId = setTimeout(() => {
                            if (tile) tile.classList.add("bounce");
                        }, i * 100);
                        bounceTimeouts.push(tId);
                    }

                    setTimeout(() => { isAnimating = false; }, 1500);
                } else {
                    isAnimating = false;
                    if (guesses.length === 10) {
                        gameStatus = "lost";
                        showToast(targetWord, true);
                    }
                }
            }, 1700);

            guesses.push(guessString);
            currentGuess = "";
            localStorage.setItem('hard_wordle_session', JSON.stringify({ targetWord, guesses, gameStatus }));
        }

        function updateKey(char, state) {
            const key = document.querySelector(`.key[data-key="${char}"]`);
            if (!key) return;
            const current = key.getAttribute("data-state");
            if (state === "correct") {
                key.setAttribute("data-state", "correct");
                key.style.backgroundColor = "var(--green)";
            } else if (state === "present" && current !== "correct") {
                key.setAttribute("data-state", "present");
                key.style.backgroundColor = "var(--yellow)";
            } else if (!current) {
                key.setAttribute("data-state", "absent");
                key.style.backgroundColor = "var(--gray)";
            }
            key.style.color = "white";
        }

        // 修改原有的 handleInput，增加遮罩状态判断
        const originalHandleInput = handleInput;
        handleInput = function (key) {
            const startScreen = document.getElementById('start-screen');
            // 如果封面还在，不处理任何输入
            if (startScreen && !startScreen.classList.contains('hidden')) return;
            originalHandleInput(key);
        };

        // 拦截键盘输入，防止在封面打开时可以玩游戏
        const oldHandleInput = handleInput;
        handleInput = function (key) {
            const screen = document.getElementById('start-screen');
            if (screen && !screen.classList.contains('hidden')) {
                // 如果按了回车也可以开始游戏
                if (key === "ENTER") dismissStartScreen();
                return;
            }
            oldHandleInput(key);
        };

        // --- 辅助函数：判断当前是否有游戏进度 ---
        function isGameDirty() {
            // 满足以下任一条件即视为“有进度”：
            // 1. 已经提交过至少一个单词 (guesses.length > 0)
            // 2. 当前行已经输入了字母 (currentGuess.length > 0)
            // 且游戏还在进行中 (gameStatus === "playing")
            return (guesses.length > 0 || currentGuess.length > 0) && gameStatus === "playing";
        }

        updateUILanguage();
        initSettings();
        initTheme();
        if (localStorage.getItem('wordle_high_contrast') === 'true') {
            document.body.classList.add('high-contrast');
        }
        initGame();
    </script>
</body>

</html>
